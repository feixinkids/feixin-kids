<main>
<section class="controls">
<div class="title-row mascot-title-row"><div class="mascot-title-copy"><small>STEP 1–6</small><h1>製作專屬吊牌</h1><span>Fifi 陪你一起整理上學用品</span></div><img class="tool-mascot" src="../images/mascots/fifi/fifi-school.png" alt="Fifi 菲菲"><button id="resetBtn" type="button">重新開始</button></div>
<article><h2>1. 照片設定</h2><div class="photo-setting-row"><div><strong>顯示照片</strong><p>關閉後文字會自動置中。</p></div><label class="switch-control"><input id="usePhoto" type="checkbox" checked><span></span></label></div><div id="photoPanel"><p class="field-title">照片形狀</p><div class="shape-buttons"><button class="active" type="button" data-shape="circle">圓形</button><button type="button" data-shape="square">圓角方形</button></div><label class="upload" for="photoInput"><strong>＋ 選擇照片</strong><em>JPG、PNG、WebP</em></label><input id="photoInput" type="file" accept="image/*" hidden><div class="range-line"><span>照片縮放</span><input id="zoomRange" type="range" min="1" max="2.5" step=".01" value="1"><output id="zoomValue">100%</output></div></div></article>
<article><h2>2. 基本資料</h2><label class="profile-field"><span>中文姓名 <b>必填</b></span><input id="nameInput" class="name-input" maxlength="8" value="林小可"></label><label class="profile-field"><span>英文名字 <em>選填</em></span><input id="englishInput" class="name-input" maxlength="16" value="Cathy"></label><label class="profile-field"><span>班級 <em>選填</em></span><input id="classInput" class="name-input" maxlength="12" value="維也納班"></label><label class="profile-field"><span>聯絡電話 <em>選填</em></span><input id="phoneInput" class="name-input" maxlength="18" value="0912-345-678"></label><div class="two"><label>文字顏色<input id="textColor" type="color" value="#4b3b52"></label><label>字體大小 <b id="fontSizeValue">100%</b><input id="fontSizeRange" type="range" min="70" max="180" step="2" value="100"></label></div><label class="check"><input id="textOutline" type="checkbox" checked>白色文字外框</label></article>
<article><h2>3. 打孔設定</h2><div class="photo-setting-row"><div><strong>顯示打孔</strong><p>關閉後吊牌不會顯示孔洞。</p></div><label class="switch-control"><input id="holeToggle" type="checkbox" checked><span></span></label></div><div id="holePositionPanel"><p class="field-title">打孔位置</p><div class="shape-buttons hole-position-buttons"><button class="active" type="button" data-hole-position="top">上方置中</button><button type="button" data-hole-position="left">左上</button><button type="button" data-hole-position="right">右上</button></div></div></article>
<article><div class="title-row"><h2>4. 選擇字體</h2><span id="fontCount" class="font-count"></span></div><div id="fontGrid" class="font-grid"></div></article>
<article><div class="title-row"><h2>5. 選擇背景</h2><div class="background-mode-tabs"><button class="active" type="button" data-bg-mode="template">固定模板</button><button type="button" data-bg-mode="solid">素色背景</button></div></div><div id="solidOptions" class="solid-options" hidden><label class="gradient-row"><span>柔和漸層</span><span class="switch-control"><input id="gradientToggle" type="checkbox"><span></span></span></label></div><div id="backgroundGrid" class="bg-grid"></div></article>
<article><h2>6. 選擇列印版型</h2><div id="layoutButtons" class="tag-layouts"><button class="active" type="button" data-layout="4">A4・4 張<small>單張約 9.5 × 13.9 cm</small></button><button type="button" data-layout="6">A4・6 張<small>單張約 9.5 × 8.9 cm</small></button><button type="button" data-layout="12">A4・12 張<small>單張約 6.4 × 6.9 cm</small></button></div><p id="layoutHint">A4 紙張會自動排列 4 張相同吊牌。</p></article>
<div class="exports mascot-exports"><img class="export-mascot" src="../images/mascots/fifi/fifi-download.png" alt="Fifi 下載完成"><button id="pngBtn" type="button">下載 PNG</button><button id="pdfBtn" type="button">下載 PDF</button><p id="exportStatus"></p></div>
</section>

<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const fonts=[{name:'圓潤預設',family:'"M PLUS Rounded 1c","Noto Sans TC",sans-serif',load:'M PLUS Rounded 1c'},{name:'貓啃珠圓',family:'"MaokenZhuyuan","Noto Sans TC",sans-serif',load:'MaokenZhuyuan'},{name:'悠哉手寫',family:'"Yozai","Noto Sans TC",sans-serif',load:'Yozai'},{name:'輕鬆圓體',family:'"Chill","Noto Sans TC",sans-serif',load:'Chill'},{name:'微笑字體',family:'"Smiley","Noto Sans TC",sans-serif',load:'Smiley'},{name:'楓糖圓體',family:'"Maple","Noto Sans TC",sans-serif',load:'Maple'},{name:'辰宇手寫',family:'"ChenYu","Noto Sans TC",sans-serif',load:'ChenYu'},{name:'粉圓字體',family:'"Huninn","Noto Sans TC",sans-serif',load:'Huninn'}];
const themes=window.FeixinTemplateData.templates,solids=window.FeixinTemplateData.solidBackgrounds;
const S={font:0,theme:'excavator',backgroundMode:'template',solidBackground:'macaron-pink',gradient:false,layout:4,usePhoto:true,shape:'circle',zoom:1,img:null,holeEnabled:true,holePosition:'top',textColor:'#4b3b52',fontScale:1,textOutline:true};
const canvas=$('#sheetCanvas'),ctx=canvas.getContext('2d');
function roundedRect(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}
function drawText(text,x,y,size,weight='700',color='#4b3b52',stroke=0){if(!text)return;ctx.save();ctx.font=`${weight} ${size}px ${fonts[S.font].family}`;ctx.textAlign='center';ctx.textBaseline='middle';if(stroke){ctx.lineWidth=stroke;ctx.strokeStyle='#fff';ctx.lineJoin='round';ctx.strokeText(text,x,y)}ctx.fillStyle=color;ctx.fillText(text,x,y);ctx.restore()}
function drawPhoto(cx,cy,size){ctx.save();roundedRect(ctx,cx-size/2,cy-size/2,size,size,S.shape==='circle'?size/2:size*.2);ctx.clip();ctx.fillStyle='#fff';ctx.fillRect(cx-size/2,cy-size/2,size,size);if(S.img){const sc=Math.max(size/S.img.width,size/S.img.height)*S.zoom,w=S.img.width*sc,h=S.img.height*sc;ctx.drawImage(S.img,cx-w/2,cy-h/2,w,h)}else{ctx.fillStyle='#f2d7e0';ctx.beginPath();ctx.arc(cx,cy-size*.13,size*.16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#e7bdcc';ctx.beginPath();ctx.arc(cx,cy+size*.39,size*.3,Math.PI,0);ctx.lineTo(cx+size*.3,cy+size*.39);ctx.lineTo(cx-size*.3,cy+size*.39);ctx.fill()}ctx.restore();ctx.save();roundedRect(ctx,cx-size/2,cy-size/2,size,size,S.shape==='circle'?size/2:size*.2);ctx.lineWidth=Math.max(8,size*.05);ctx.strokeStyle='#fff';ctx.stroke();ctx.restore()}
const themeImageCache=new Map();
function getThemeImage(t){const src=t?.[4];if(!src)return null;if(!themeImageCache.has(src)){const im=new Image();im.decoding='async';im.onload=()=>drawSheet();im.src=src;themeImageCache.set(src,im)}return themeImageCache.get(src)}
function drawThemeImage(c,im,cx,cy,box){if(!im||!im.complete||!im.naturalWidth)return;const sc=Math.min(box/im.naturalWidth,box/im.naturalHeight),w=im.naturalWidth*sc,h=im.naturalHeight*sc;c.drawImage(im,cx-w/2,cy-h/2,w,h)}
function backgroundFill(x,y,w,h,t){if(S.backgroundMode==='solid'){const col=solids.find(v=>v[0]===S.solidBackground)?.[2]||'#F8DDE7';if(S.gradient){const g=ctx.createLinearGradient(x,y,x+w,y+h);g.addColorStop(0,col);g.addColorStop(1,'#fff');ctx.fillStyle=g}else ctx.fillStyle=col}else ctx.fillStyle=t[2];ctx.fillRect(x,y,w,h)}
function decorations(x,y,w,h,t){if(S.backgroundMode!=='template')return;const size=Math.min(w,h)*.62,im=getThemeImage(t);ctx.save();ctx.globalAlpha=.20;drawThemeImage(ctx,im,x+w*.18,y+h*.20,size);drawThemeImage(ctx,im,x+w*.82,y+h*.80,size);ctx.restore()}
function drawTag(x,y,w,h){const t=themes.find(v=>v[0]===S.theme)||themes[0];ctx.save();roundedRect(ctx,x,y,w,h,Math.min(w,h)*.08);ctx.clip();backgroundFill(x,y,w,h,t);decorations(x,y,w,h,t);ctx.restore();ctx.save();if(S.holeEnabled){const radius=Math.min(28,w*.04,h*.04);const safeX=Math.max(radius*2.2,w*.075),safeY=Math.max(radius*2.2,h*.055);let holeX=x+w/2,holeY=y+safeY;if(S.holePosition==='left')holeX=x+safeX;else if(S.holePosition==='right')holeX=x+w-safeX;ctx.beginPath();ctx.arc(holeX,holeY,radius,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.lineWidth=Math.max(5,w*.009);ctx.strokeStyle=(S.backgroundMode==='template'?t[3]:'#c7a6b5')+'88';ctx.stroke()}const compact=h/w<1.15,photoSize=S.usePhoto?Math.min(w*(compact?.28:.42),h*(compact?.34:.28)):0;let yy=y+h*(compact?.48:.43);if(S.usePhoto){drawPhoto(x+w/2,yy,photoSize);yy+=photoSize*(compact?.75:.72)}else yy=y+h*.43;const mainSize=Math.min(w*(compact?.075:.105),h*.09)*S.fontScale;const mainStroke=S.textOutline?Math.max(4,w*.009):0;drawText($('#nameInput').value.trim()||'姓名',x+w/2,yy,mainSize,'800',S.textColor,mainStroke);yy+=Math.min(w*.075,h*.07)*S.fontScale;const small=Math.min(w*(compact?.033:.047),h*.045)*S.fontScale;const smallStroke=S.textOutline?Math.max(2,w*.004):0;drawText($('#englishInput').value.trim(),x+w/2,yy,small,'700',S.textColor,smallStroke);yy+=small*1.55;drawText($('#classInput').value.trim(),x+w/2,yy,small*.92,'700',S.textColor,smallStroke);yy+=small*1.45;drawText($('#phoneInput').value.trim(),x+w/2,yy,small*.88,'700',S.textColor,smallStroke);ctx.restore()}
async function drawSheet(){await document.fonts.ready;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);const cfg={4:{cols:2,rows:2,gap:70,padX:110,padTop:100,padBottom:160},6:{cols:2,rows:3,gap:55,padX:110,padTop:90,padBottom:150},12:{cols:3,rows:4,gap:38,padX:75,padTop:80,padBottom:145}}[S.layout];const w=(canvas.width-cfg.padX*2-cfg.gap*(cfg.cols-1))/cfg.cols,h=(canvas.height-cfg.padTop-cfg.padBottom-cfg.gap*(cfg.rows-1))/cfg.rows;for(let r=0;r<cfg.rows;r++)for(let c=0;c<cfg.cols;c++)drawTag(cfg.padX+c*(w+cfg.gap),cfg.padTop+r*(h+cfg.gap),w,h);drawText('© 2026 Feixin Kids · Design · Download · Print',canvas.width/2,canvas.height-65,34,'500','#9d8d95');$('#meta').textContent=`A4・${S.layout} 張`;$('#layoutHint').textContent=`A4 紙張會自動排列 ${S.layout} 張相同吊牌。`;window.FeixinSharedData?.write({chineseName:$('#nameInput').value,englishName:$('#englishInput').value,className:$('#classInput').value});updateMobileTagPreview()}
function renderFonts(){$('#fontCount').textContent=`${fonts.length} 款固定字體`;$('#fontGrid').innerHTML=fonts.map((f,i)=>`<button class="font-btn ${i===S.font?'active':''}" data-font="${i}" type="button"><span class="font-display-name" style='font-family:${f.family}'>${f.name}</span></button>`).join('')}
function renderBackgrounds(){const items=S.backgroundMode==='template'?themes:solids;$('#solidOptions').hidden=S.backgroundMode!=='solid';$$('[data-bg-mode]').forEach(b=>b.classList.toggle('active',b.dataset.bgMode===S.backgroundMode));$('#backgroundGrid').innerHTML=items.map(v=>{const active=S.backgroundMode==='template'?v[0]===S.theme:v[0]===S.solidBackground;const bg=S.backgroundMode==='template'?v[2]:(S.gradient?`linear-gradient(135deg,${v[2]},#fff)`:v[2]);return `<button class="bg-btn ${active?'active':''}" data-bg-id="${v[0]}" type="button"><span class="swatch" style="background:${bg}">${S.backgroundMode==='template'?`<img src="${v[4]}" alt="" loading="lazy">`:''}</span><span>${v[1]}</span></button>`}).join('')}
async function chooseFont(i){S.font=i;renderFonts();try{await document.fonts.load(`800 48px "${fonts[i].load}"`,'林小可')}catch(e){}drawSheet()}
$('#fontGrid').onclick=e=>{const b=e.target.closest('[data-font]');if(b)chooseFont(+b.dataset.font)};$('#backgroundGrid').onclick=e=>{const b=e.target.closest('[data-bg-id]');if(!b)return;if(S.backgroundMode==='template')S.theme=b.dataset.bgId;else S.solidBackground=b.dataset.bgId;renderBackgrounds();drawSheet()};$$('[data-bg-mode]').forEach(b=>b.onclick=()=>{S.backgroundMode=b.dataset.bgMode;renderBackgrounds();drawSheet()});$('#gradientToggle').onchange=e=>{S.gradient=e.target.checked;renderBackgrounds();drawSheet()};
$$('#nameInput,#englishInput,#classInput,#phoneInput').forEach(i=>i.addEventListener('input',drawSheet));$('#textColor').addEventListener('input',e=>{S.textColor=e.target.value;drawSheet()});$('#fontSizeRange').addEventListener('input',e=>{S.fontScale=+e.target.value/100;$('#fontSizeValue').textContent=e.target.value+'%';drawSheet()});$('#textOutline').addEventListener('change',e=>{S.textOutline=e.target.checked;drawSheet()});$('#usePhoto').onchange=e=>{S.usePhoto=e.target.checked;$('#photoPanel').hidden=!S.usePhoto;drawSheet()};$('#holeToggle').onchange=e=>{S.holeEnabled=e.target.checked;$('#holePositionPanel').hidden=!S.holeEnabled;drawSheet()};$$('[data-hole-position]').forEach(b=>b.onclick=()=>{$$('[data-hole-position]').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.holePosition=b.dataset.holePosition;drawSheet()});$$('[data-shape]').forEach(b=>b.onclick=()=>{$$('[data-shape]').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.shape=b.dataset.shape;drawSheet()});$('#photoInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader;r.onload=()=>{const im=new Image;im.onload=()=>{S.img=im;drawSheet()};im.src=r.result};r.readAsDataURL(f)};$('#zoomRange').oninput=e=>{S.zoom=+e.target.value;$('#zoomValue').value=Math.round(S.zoom*100)+'%';drawSheet()};$('#layoutButtons').onclick=e=>{const b=e.target.closest('[data-layout]');if(!b)return;$$('[data-layout]').forEach(x=>x.classList.remove('active'));b.classList.add('active');S.layout=+b.dataset.layout;drawSheet()};
function download(url,name){const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove()}$('#pngBtn').onclick=()=>download(canvas.toDataURL('image/png'),`Feixin-Kids-V5.2.5-吊牌-${S.layout}張版.png`);$('#pdfBtn').onclick=()=>{try{if(!window.jspdf?.jsPDF)throw new Error('PDF 元件載入失敗，請確認網路連線後重新整理。');const {jsPDF}=window.jspdf,p=new jsPDF({orientation:'portrait',unit:'mm',format:'a4',compress:true});p.addImage(canvas.toDataURL('image/jpeg',.96),'JPEG',0,0,210,297,undefined,'FAST');p.save(`Feixin-Kids-V5.2.5-吊牌-${S.layout}張版.pdf`)}catch(e){alert(e.message)}};
$('#resetBtn').onclick=()=>{Object.assign(S,{font:0,theme:'excavator',backgroundMode:'template',solidBackground:'macaron-pink',gradient:false,layout:4,usePhoto:true,shape:'circle',zoom:1,img:null,holeEnabled:true,holePosition:'top',textColor:'#4b3b52',fontScale:1,textOutline:true});$('#nameInput').value='林小可';$('#englishInput').value='Cathy';$('#classInput').value='維也納班';$('#phoneInput').value='0912-345-678';$('#textColor').value='#4b3b52';$('#fontSizeRange').value=100;$('#fontSizeValue').textContent='100%';$('#textOutline').checked=true;$('#usePhoto').checked=true;$('#photoPanel').hidden=false;$('#gradientToggle').checked=false;$('#holeToggle').checked=true;$('#holePositionPanel').hidden=false;$$('[data-hole-position]').forEach((b,i)=>b.classList.toggle('active',i===0));$('#zoomRange').value=1;$('#zoomValue').value='100%';$$('[data-layout]').forEach((b,i)=>b.classList.toggle('active',i===0));$$('[data-shape]').forEach((b,i)=>b.classList.toggle('active',i===0));renderFonts();renderBackgrounds();drawSheet()};

// 手機版單張吊牌浮動預覽與完整預覽
const mobilePreviewButton=$('#mobilePreviewBtn');
const mobileTagCanvas=$('#mobileStickerCanvas');
const mobilePreviewModal=$('#mobilePreviewModal');
const closeMobilePreviewButton=$('#closeMobilePreviewBtn');
const mobilePreviewContent=$('#mobilePreviewContent');
const previewSection=$('.preview');
const previewPlaceholder=document.createComment('bag-tag-preview-original-position');

function getLayoutGeometry(){
  const cfg={4:{cols:2,rows:2,gap:70,padX:110,padTop:100,padBottom:160},6:{cols:2,rows:3,gap:55,padX:110,padTop:90,padBottom:150},12:{cols:3,rows:4,gap:38,padX:75,padTop:80,padBottom:145}}[S.layout];
  return {cfg,w:(canvas.width-cfg.padX*2-cfg.gap*(cfg.cols-1))/cfg.cols,h:(canvas.height-cfg.padTop-cfg.padBottom-cfg.gap*(cfg.rows-1))/cfg.rows};
}
function updateMobileTagPreview(){
  if(!mobileTagCanvas)return;
  const mctx=mobileTagCanvas.getContext('2d');
  const {cfg,w,h}=getLayoutGeometry();
  const padding=10,availableW=mobileTagCanvas.width-padding*2,availableH=mobileTagCanvas.height-padding*2;
  const scale=Math.min(availableW/w,availableH/h);
  const dw=w*scale,dh=h*scale,dx=(mobileTagCanvas.width-dw)/2,dy=(mobileTagCanvas.height-dh)/2;
  mctx.clearRect(0,0,mobileTagCanvas.width,mobileTagCanvas.height);
  mctx.fillStyle='#f4edf1';mctx.fillRect(0,0,mobileTagCanvas.width,mobileTagCanvas.height);
  mctx.drawImage(canvas,cfg.padX,cfg.padTop,w,h,dx,dy,dw,dh);
}
function openMobilePreview(){
  if(!mobilePreviewModal||!mobilePreviewContent||!previewSection)return;
  if(!previewPlaceholder.parentNode)previewSection.parentNode.insertBefore(previewPlaceholder,previewSection);
  mobilePreviewContent.appendChild(previewSection);
  mobilePreviewModal.hidden=false;
  document.body.classList.add('mobile-preview-open');
  drawSheet();
  requestAnimationFrame(()=>mobilePreviewContent.scrollTo({top:0,behavior:'instant'}));
}
function closeMobilePreview(){
  if(!mobilePreviewModal||!previewSection||!previewPlaceholder.parentNode)return;
  previewPlaceholder.parentNode.insertBefore(previewSection,previewPlaceholder);
  previewPlaceholder.remove();
  mobilePreviewModal.hidden=true;
  document.body.classList.remove('mobile-preview-open');
}
mobilePreviewButton?.addEventListener('click',openMobilePreview);
closeMobilePreviewButton?.addEventListener('click',closeMobilePreview);
mobilePreviewModal?.addEventListener('click',e=>{if(e.target===mobilePreviewModal)closeMobilePreview()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&mobilePreviewModal&&!mobilePreviewModal.hidden)closeMobilePreview()});
window.addEventListener('resize',()=>{if(window.innerWidth>980&&mobilePreviewModal&&!mobilePreviewModal.hidden)closeMobilePreview();updateMobileTagPreview()});
