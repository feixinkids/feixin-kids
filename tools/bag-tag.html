<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>書包／行李吊牌製作器｜Feixin Kids</title>
  <meta
    name="description"
    content="免費製作書包吊牌與行李吊牌，可自訂姓名、班級、電話、顏色與可愛插畫背景。"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --page-bg: #fff8fb;
      --panel-bg: rgba(255, 255, 255, 0.92);
      --card-bg: #ffffff;
      --pink: #f284a8;
      --pink-dark: #d95f8d;
      --pink-soft: #ffe4ee;
      --text: #4a3b45;
      --muted: #8c7d86;
      --line: #f0dce5;
      --shadow: 0 16px 40px rgba(181, 107, 139, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(255, 205, 222, 0.52) 0 9px, transparent 10px),
        radial-gradient(circle at 92% 18%, rgba(215, 210, 255, 0.45) 0 7px, transparent 8px),
        radial-gradient(circle at 18% 88%, rgba(206, 239, 232, 0.5) 0 8px, transparent 9px),
        linear-gradient(180deg, #fffafd 0%, var(--page-bg) 100%);
      background-size: 120px 120px, 150px 150px, 140px 140px, auto;
      font-family: "Noto Sans TC", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      padding: 12px clamp(18px, 4vw, 56px);
      background: rgba(255, 255, 255, 0.84);
      border-bottom: 1px solid rgba(240, 220, 229, 0.8);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 3vw, 27px);
      color: var(--pink-dark);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(145deg, #ffb4cb, #f178a1);
      color: #fff;
      box-shadow: 0 8px 18px rgba(217, 95, 141, 0.24);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #765f6c;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      border-color: #e9bfd0;
      color: var(--pink-dark);
    }

    .page {
      width: min(1480px, calc(100% - 32px));
      margin: 28px auto 48px;
    }

    .page-heading {
      margin-bottom: 22px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      padding: 7px 13px;
      border-radius: 999px;
      background: #fff;
      color: var(--pink-dark);
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 8px 22px rgba(181, 107, 139, 0.08);
    }

    h1 {
      margin: 0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.2;
      color: #4c3b45;
    }

    .lead {
      margin: 10px auto 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.8;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(330px, 440px) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .settings-panel,
    .preview-panel {
      border: 1px solid rgba(240, 220, 229, 0.92);
      border-radius: var(--radius-xl);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .settings-panel {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .section-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card-bg);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 16px 17px 13px;
      border-bottom: 1px solid #f7eaf0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: 17px;
      font-weight: 800;
    }

    .section-icon {
      display: grid;
      place-items: center;
      width: 33px;
      height: 33px;
      border-radius: 12px;
      background: var(--pink-soft);
      font-size: 17px;
    }

    .section-body {
      padding: 16px 17px 18px;
    }

    .field + .field {
      margin-top: 14px;
    }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-weight: 700;
      color: #5f4c57;
    }

    .optional {
      color: #aa96a1;
      font-size: 12px;
      font-weight: 600;
    }

    .text-input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid #ead6df;
      border-radius: 14px;
      outline: none;
      background: #fffafd;
      color: var(--text);
      transition: 0.2s ease;
    }

    .text-input::placeholder {
      color: #c1afb8;
    }

    .text-input:focus {
      border-color: #e88aae;
      box-shadow: 0 0 0 4px rgba(242, 132, 168, 0.13);
      background: #fff;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .switch-copy strong {
      display: block;
      margin-bottom: 3px;
    }

    .switch-copy span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .switch {
      position: relative;
      flex: 0 0 auto;
      width: 52px;
      height: 30px;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .switch-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #ddd2d7;
      transition: 0.22s ease;
    }

    .switch-track::after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 9px rgba(70, 45, 57, 0.18);
      transition: 0.22s ease;
    }

    .switch input:checked + .switch-track {
      background: linear-gradient(135deg, #f7a1bc, var(--pink));
    }

    .switch input:checked + .switch-track::after {
      transform: translateX(22px);
    }

    .upload-box {
      display: grid;
      place-items: center;
      min-height: 120px;
      margin-top: 14px;
      padding: 18px;
      border: 2px dashed #efc3d4;
      border-radius: 18px;
      background: #fff9fc;
      text-align: center;
      color: #8b7180;
    }

    .upload-box b {
      display: block;
      margin-top: 7px;
      color: var(--pink-dark);
    }

    .upload-box small {
      display: block;
      margin-top: 5px;
      line-height: 1.6;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .option-grid.seven {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .option-button {
      position: relative;
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid #ead8e1;
      border-radius: 14px;
      background: #fff;
      color: #6b5662;
      font-weight: 700;
      transition: 0.18s ease;
    }

    .option-button:hover {
      transform: translateY(-1px);
      border-color: #e5afc3;
    }

    .option-button.active {
      border-color: #ef8fb1;
      background: #fff0f6;
      color: var(--pink-dark);
      box-shadow: inset 0 0 0 1px #ef8fb1;
    }

    .color-button {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 66px;
      padding: 8px 4px;
      font-size: 12px;
    }

    .color-dot {
      width: 25px;
      height: 25px;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(95, 76, 87, 0.15);
    }

    .theme-area.is-hidden,
    .photo-controls.is-hidden {
      display: none;
    }

    .preview-panel {
      position: sticky;
      top: 94px;
      min-height: 720px;
      padding: 18px;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 3px 4px;
    }

    .preview-toolbar h2 {
      margin: 0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: 20px;
    }

    .preview-note {
      color: var(--muted);
      font-size: 13px;
    }

    .preview-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 610px;
      overflow: hidden;
      padding: 44px 24px;
      border: 1px solid #f1dce5;
      border-radius: 23px;
      background:
        linear-gradient(45deg, #f8edf2 25%, transparent 25%),
        linear-gradient(-45deg, #f8edf2 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8edf2 75%),
        linear-gradient(-45deg, transparent 75%, #f8edf2 75%),
        #fff;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-size: 24px 24px;
    }

    .tag-shell {
      position: relative;
      width: min(330px, 78vw);
      aspect-ratio: 7 / 10;
      filter: drop-shadow(0 22px 28px rgba(91, 57, 74, 0.18));
    }

    .tag-card {
      --tag-main: #ffdbe8;
      --tag-secondary: #fff2f7;
      position: absolute;
      inset: 18px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 42px 30px 32px;
      border: 8px solid #fff;
      border-radius: 34px;
      background:
        linear-gradient(155deg, rgba(255,255,255,.72), rgba(255,255,255,.12)),
        var(--tag-main);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.72);
      text-align: center;
      isolation: isolate;
    }

    .tag-card::before,
    .tag-card::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 999px;
      background: rgba(255,255,255,.28);
    }

    .tag-card::before {
      width: 180px;
      height: 180px;
      top: -70px;
      right: -55px;
    }

    .tag-card::after {
      width: 145px;
      height: 145px;
      left: -45px;
      bottom: -55px;
    }

    .hole-mark {
      position: absolute;
      z-index: 4;
      width: 22px;
      height: 22px;
      border: 3px solid rgba(107, 86, 98, 0.52);
      border-radius: 50%;
      background: rgba(255,255,255,.94);
      box-shadow: 0 2px 6px rgba(91, 57, 74, 0.12);
      transition: 0.2s ease;
    }

    .hole-mark.center {
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
    }

    .hole-mark.corner {
      top: 25px;
      left: 18px;
    }

    .hole-mark.none {
      display: none;
    }

    .illustrations {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .deco {
      position: absolute;
      font-size: 28px;
      filter: drop-shadow(0 3px 2px rgba(91,57,74,.08));
    }

    .deco.a { top: 22px; left: 22px; transform: rotate(-10deg); }
    .deco.b { top: 58px; right: 22px; transform: rotate(12deg); }
    .deco.c { bottom: 25px; left: 22px; transform: rotate(7deg); }
    .deco.d { bottom: 58px; right: 20px; transform: rotate(-9deg); }

    .tag-card.simple .illustrations {
      display: none;
    }

    .photo-frame {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 150px;
      height: 150px;
      margin-bottom: 22px;
      overflow: hidden;
      border: 7px solid rgba(255,255,255,.92);
      border-radius: 50%;
      background: rgba(255,255,255,.54);
      box-shadow: 0 12px 22px rgba(91,57,74,.12);
      color: rgba(107,86,98,.62);
      font-size: 42px;
    }

    .photo-frame.square {
      border-radius: 28px;
    }

    .photo-frame.is-hidden {
      display: none;
    }

    .tag-text {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .tag-name,
    .tag-class,
    .tag-phone {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .tag-name {
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: clamp(31px, 5vw, 42px);
      font-weight: 800;
      line-height: 1.25;
      color: #57424d;
      text-shadow: 0 2px 0 rgba(255,255,255,.45);
    }

    .tag-class,
    .tag-phone {
      margin-top: 9px;
      color: #725d69;
      font-weight: 700;
      line-height: 1.5;
    }

    .tag-class {
      font-size: 20px;
    }

    .tag-phone {
      font-size: 16px;
      letter-spacing: 0.04em;
    }

    .tag-name:empty,
    .tag-class:empty,
    .tag-phone:empty {
      display: none;
    }

    .tag-card.no-photo .tag-name {
      font-size: clamp(38px, 7vw, 54px);
    }

    .tag-card.name-only .tag-name {
      font-size: clamp(44px, 8vw, 62px);
    }

    .action-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .action-button {
      min-height: 52px;
      border-radius: 16px;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .action-button.primary {
      background: linear-gradient(135deg, #f49abc, var(--pink-dark));
      color: #fff;
      box-shadow: 0 10px 20px rgba(217, 95, 141, 0.23);
    }

    .action-button.secondary {
      border: 1px solid #ecc4d3;
      background: #fff;
      color: var(--pink-dark);
    }

    .action-button:hover {
      transform: translateY(-1px);
    }

    .coming-note {
      margin: 11px 0 0;
      color: #a28e99;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 380px minmax(0, 1fr);
      }

      .option-grid.seven {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 880px) {
      .topbar {
        min-height: 64px;
        padding: 10px 16px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .back-link {
        min-height: 38px;
        padding: 0 13px;
        font-size: 13px;
      }

      .page {
        width: min(100% - 20px, 760px);
        margin-top: 20px;
      }

      .workspace {
        display: flex;
        flex-direction: column;
      }

      .settings-panel,
      .preview-panel {
        width: 100%;
      }

      .preview-panel {
        position: static;
        min-height: 0;
        order: -1;
      }

      .preview-stage {
        min-height: 520px;
        padding: 30px 16px;
      }

      .tag-shell {
        width: min(300px, 80vw);
      }
    }

    @media (max-width: 520px) {
      .page-heading {
        padding-inline: 10px;
      }

      .lead {
        font-size: 14px;
      }

      .settings-panel,
      .preview-panel {
        border-radius: 22px;
      }

      .settings-panel {
        padding: 11px;
      }

      .section-title,
      .section-body {
        padding-left: 14px;
        padding-right: 14px;
      }

      .option-grid.seven {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .preview-stage {
        min-height: 455px;
      }

      .tag-shell {
        width: min(270px, 82vw);
      }

      .tag-card {
        inset-top: 16px;
        padding: 38px 22px 26px;
        border-width: 6px;
        border-radius: 29px;
      }

      .photo-frame {
        width: 124px;
        height: 124px;
        margin-bottom: 18px;
      }

      .tag-class {
        font-size: 17px;
      }

      .tag-phone {
        font-size: 14px;
      }

      .action-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="../css/components.css" />
</head>

<body>
  <header class="tool-header">
    <a
      class="tool-header-home"
      href="../index.html"
      aria-label="返回 Feixin Kids 首頁"
    >
      <b>Feixin Kids</b>
      <span>書包／行李吊牌</span>
    </a>
  </header>

  <main class="page">
    <section class="page-heading">
      <div class="eyebrow">🎒 第二個親子設計工具</div>
      <h1>書包／行李吊牌製作器</h1>
      <p class="lead">
        自由選擇照片、色系與插畫主題，快速製作適合書包、行李箱與生活用品的專屬吊牌。
      </p>
    </section>

    <section class="workspace">
      <aside class="settings-panel fx-card" aria-label="吊牌設定">
        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">📷</span>
            照片
          </h2>

          <div class="section-body">
            <div class="switch-row">
              <div class="switch-copy">
                <strong>使用照片</strong>
                <span>不需要照片時可直接關閉。</span>
              </div>

              <label class="switch">
                <input id="usePhoto" type="checkbox" checked />
                <span class="switch-track"></span>
              </label>
            </div>

            <div id="photoControls" class="photo-controls">
              <button class="upload-box" type="button" aria-label="上傳照片">
                <span style="font-size:32px">＋</span>
                <b>上傳照片</b>
                <small>第一版先完成介面，下一版加入實際上傳與裁切功能。</small>
              </button>

              <div class="field">
                <div class="field-label">照片形狀</div>
                <div class="option-grid" data-group="photoShape">
                  <button class="option-button active" type="button" data-value="circle">圓形</button>
                  <button class="option-button" type="button" data-value="square">圓角方形</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">👤</span>
            基本資料
          </h2>

          <div class="section-body">
            <label class="field">
              <span class="field-label">
                <span>姓名</span>
                <span class="optional">可留白</span>
              </span>
              <input
                id="nameInput"
                class="text-input"
                type="text"
                maxlength="12"
                placeholder="例如：林小可"
                value="林小可"
              />
            </label>

            <label class="field">
              <span class="field-label">
                <span>班級</span>
                <span class="optional">選填</span>
              </span>
              <input
                id="classInput"
                class="text-input"
                type="text"
                maxlength="18"
                placeholder="例如：維也納班"
                value="維也納班"
              />
            </label>

            <label class="field">
              <span class="field-label">
                <span>電話</span>
                <span class="optional">選填</span>
              </span>
              <input
                id="phoneInput"
                class="text-input"
                type="text"
                maxlength="20"
                placeholder="例如：0912-345-678"
              />
            </label>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">🎨</span>
            主色系
          </h2>

          <div class="section-body">
            <div class="option-grid seven" data-group="color">
              <button class="option-button color-button active" type="button" data-value="pink">
                <span class="color-dot" style="background:#ffdbe8"></span>
                粉紅
              </button>
              <button class="option-button color-button" type="button" data-value="blue">
                <span class="color-dot" style="background:#dceeff"></span>
                天空藍
              </button>
              <button class="option-button color-button" type="button" data-value="purple">
                <span class="color-dot" style="background:#e8ddff"></span>
                薰衣草紫
              </button>
              <button class="option-button color-button" type="button" data-value="mint">
                <span class="color-dot" style="background:#dff5ec"></span>
                薄荷綠
              </button>
              <button class="option-button color-button" type="button" data-value="yellow">
                <span class="color-dot" style="background:#fff0bd"></span>
                奶油黃
              </button>
              <button class="option-button color-button" type="button" data-value="cream">
                <span class="color-dot" style="background:#f7f0df"></span>
                米白
              </button>
              <button class="option-button color-button" type="button" data-value="latte">
                <span class="color-dot" style="background:#ead8c6"></span>
                奶茶
              </button>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">✨</span>
            背景樣式
          </h2>

          <div class="section-body">
            <div class="option-grid" data-group="backgroundStyle">
              <button class="option-button active" type="button" data-value="cute">可愛插畫</button>
              <button class="option-button" type="button" data-value="simple">簡約素色</button>
            </div>

            <div id="themeArea" class="theme-area">
              <div class="field">
                <div class="field-label">插畫主題</div>
                <div class="option-grid" data-group="theme">
                  <button class="option-button active" type="button" data-value="heart">愛心</button>
                  <button class="option-button" type="button" data-value="star">星星</button>
                  <button class="option-button" type="button" data-value="rainbow">彩虹</button>
                  <button class="option-button" type="button" data-value="flower">小花</button>
                  <button class="option-button" type="button" data-value="cloud">雲朵</button>
                  <button class="option-button" type="button" data-value="forest">森林</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">🔩</span>
            吊掛方式
          </h2>

          <div class="section-body">
            <div class="option-grid" data-group="holePosition">
              <button class="option-button active" type="button" data-value="center">上方置中</button>
              <button class="option-button" type="button" data-value="corner">左上角</button>
              <button class="option-button" type="button" data-value="none">不預留打孔</button>
            </div>

            <div class="switch-row" style="margin-top:15px">
              <div class="switch-copy">
                <strong>顯示打孔定位記號</strong>
                <span>列印後方便對準打孔位置。</span>
              </div>

              <label class="switch">
                <input id="showHoleMark" type="checkbox" checked />
                <span class="switch-track"></span>
              </label>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title">
            <span class="section-icon">🖨️</span>
            列印版型
          </h2>

          <div class="section-body">
            <div class="option-grid" data-group="printLayout">
              <button class="option-button active" type="button" data-value="4">A4・4 張版</button>
              <button class="option-button" type="button" data-value="6">A4・6 張版</button>
            </div>

            <div class="action-bar">
              <button class="action-button secondary" type="button">下載 PNG</button>
              <button class="action-button primary" type="button">下載 PDF</button>
            </div>

            <p class="coming-note">
              目前先完成操作介面與即時預覽；PNG、PDF 與正式列印尺寸會在後續版本接上。
            </p>
          </div>
        </section>
      </aside>

      <section class="preview-panel fx-card" aria-label="吊牌預覽">
        <div class="preview-toolbar">
          <h2>即時預覽</h2>
          <div id="layoutNote" class="preview-note">A4・4 張版</div>
        </div>

        <div class="preview-stage">
          <div class="tag-shell">
            <span id="holeMark" class="hole-mark center" aria-hidden="true"></span>

            <article id="tagCard" class="tag-card">
              <div id="illustrations" class="illustrations" aria-hidden="true">
                <span class="deco a">♡</span>
                <span class="deco b">♥</span>
                <span class="deco c">♥</span>
                <span class="deco d">♡</span>
              </div>

              <div id="photoFrame" class="photo-frame" aria-label="照片預覽">☺</div>

              <div class="tag-text">
                <div id="tagName" class="tag-name">林小可</div>
                <div id="tagClass" class="tag-class">維也納班</div>
                <div id="tagPhone" class="tag-phone"></div>
              </div>
            </article>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const state = {
      usePhoto: true,
      photoShape: "circle",
      color: "pink",
      backgroundStyle: "cute",
      theme: "heart",
      holePosition: "center",
      showHoleMark: true,
      printLayout: "4"
    };

    const colorMap = {
      pink: "#ffdbe8",
      blue: "#dceeff",
      purple: "#e8ddff",
      mint: "#dff5ec",
      yellow: "#fff0bd",
      cream: "#f7f0df",
      latte: "#ead8c6"
    };

    const themeMap = {
      heart: ["♡", "♥", "♥", "♡"],
      star: ["✦", "★", "☆", "✦"],
      rainbow: ["🌈", "☁", "✦", "♡"],
      flower: ["✿", "❀", "✾", "✿"],
      cloud: ["☁", "☁", "✦", "☁"],
      forest: ["🍃", "🌿", "🍀", "🍃"]
    };

    const nameInput = document.getElementById("nameInput");
    const classInput = document.getElementById("classInput");
    const phoneInput = document.getElementById("phoneInput");
    const usePhoto = document.getElementById("usePhoto");
    const showHoleMark = document.getElementById("showHoleMark");

    const tagCard = document.getElementById("tagCard");
    const tagName = document.getElementById("tagName");
    const tagClass = document.getElementById("tagClass");
    const tagPhone = document.getElementById("tagPhone");
    const photoFrame = document.getElementById("photoFrame");
    const photoControls = document.getElementById("photoControls");
    const themeArea = document.getElementById("themeArea");
    const illustrations = document.getElementById("illustrations");
    const holeMark = document.getElementById("holeMark");
    const layoutNote = document.getElementById("layoutNote");

    function updateTextPreview() {
      const name = nameInput.value.trim();
      const className = classInput.value.trim();
      const phone = phoneInput.value.trim();

      tagName.textContent = name;
      tagClass.textContent = className;
      tagPhone.textContent = phone;

      const hasExtraText = Boolean(className || phone);
      tagCard.classList.toggle("name-only", Boolean(name) && !hasExtraText && !state.usePhoto);
      tagCard.classList.toggle("no-photo", !state.usePhoto);
    }

    function updatePhotoPreview() {
      photoFrame.classList.toggle("is-hidden", !state.usePhoto);
      photoControls.classList.toggle("is-hidden", !state.usePhoto);
      photoFrame.classList.toggle("square", state.photoShape === "square");
      updateTextPreview();
    }

    function updateBackground() {
      tagCard.style.setProperty("--tag-main", colorMap[state.color]);
      tagCard.classList.toggle("simple", state.backgroundStyle === "simple");
      themeArea.classList.toggle("is-hidden", state.backgroundStyle === "simple");

      const icons = themeMap[state.theme];
      [...illustrations.querySelectorAll(".deco")].forEach((item, index) => {
        item.textContent = icons[index];
      });
    }

    function updateHole() {
      holeMark.className = `hole-mark ${state.holePosition}`;
      const shouldShow = state.showHoleMark && state.holePosition !== "none";
      holeMark.style.display = shouldShow ? "" : "none";
    }

    function updateLayout() {
      layoutNote.textContent = `A4・${state.printLayout} 張版`;
    }

    function handleOptionGroup(group) {
      group.addEventListener("click", (event) => {
        const button = event.target.closest(".option-button");
        if (!button) return;

        group.querySelectorAll(".option-button").forEach((item) => {
          item.classList.remove("active");
        });

        button.classList.add("active");

        const groupName = group.dataset.group;
        state[groupName] = button.dataset.value;

        if (groupName === "photoShape") updatePhotoPreview();
        if (groupName === "color" || groupName === "backgroundStyle" || groupName === "theme") updateBackground();
        if (groupName === "holePosition") updateHole();
        if (groupName === "printLayout") updateLayout();
      });
    }

    document.querySelectorAll("[data-group]").forEach(handleOptionGroup);

    [nameInput, classInput, phoneInput].forEach((input) => {
      input.addEventListener("input", updateTextPreview);
    });

    usePhoto.addEventListener("change", () => {
      state.usePhoto = usePhoto.checked;
      updatePhotoPreview();
    });

    showHoleMark.addEventListener("change", () => {
      state.showHoleMark = showHoleMark.checked;
      updateHole();
    });

    updateTextPreview();
    updatePhotoPreview();
    updateBackground();
    updateHole();
    updateLayout();
  </script>
</body>
</html>
