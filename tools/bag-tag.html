<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>書包／行李吊牌製作器｜Feixin Kids</title>
  <meta
    name="description"
    content="免費製作書包吊牌與行李吊牌，可自訂姓名、班級、電話、顏色與可愛插畫背景。"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --page-bg: #fff8fb;
      --panel-bg: rgba(255, 255, 255, 0.92);
      --card-bg: #ffffff;
      --pink: #f284a8;
      --pink-dark: #d95f8d;
      --pink-soft: #ffe4ee;
      --text: #4a3b45;
      --muted: #8c7d86;
      --line: #f0dce5;
      --shadow: 0 16px 40px rgba(181, 107, 139, 0.12);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(255, 205, 222, 0.52) 0 9px, transparent 10px),
        radial-gradient(circle at 92% 18%, rgba(215, 210, 255, 0.45) 0 7px, transparent 8px),
        radial-gradient(circle at 18% 88%, rgba(206, 239, 232, 0.5) 0 8px, transparent 9px),
        linear-gradient(180deg, #fffafd 0%, var(--page-bg) 100%);
      background-size: 120px 120px, 150px 150px, 140px 140px, auto;
      font-family: "Noto Sans TC", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 72px;
      padding: 12px clamp(18px, 4vw, 56px);
      background: rgba(255, 255, 255, 0.84);
      border-bottom: 1px solid rgba(240, 220, 229, 0.8);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-weight: 800;
      font-size: clamp(20px, 3vw, 27px);
      color: var(--pink-dark);
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: linear-gradient(145deg, #ffb4cb, #f178a1);
      color: #fff;
      box-shadow: 0 8px 18px rgba(217, 95, 141, 0.24);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #765f6c;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      border-color: #e9bfd0;
      color: var(--pink-dark);
    }

    .page {
      width: min(1480px, calc(100% - 32px));
      margin: 28px auto 48px;
    }

    .page-heading {
      margin-bottom: 22px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      padding: 7px 13px;
      border-radius: 999px;
      background: #fff;
      color: var(--pink-dark);
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 8px 22px rgba(181, 107, 139, 0.08);
    }

    h1 {
      margin: 0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.2;
      color: #4c3b45;
    }

    .lead {
      margin: 10px auto 0;
      max-width: 680px;
      color: var(--muted);
      line-height: 1.8;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(330px, 440px) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .settings-panel,
    .preview-panel {
      border: 1px solid rgba(240, 220, 229, 0.92);
      border-radius: var(--radius-xl);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .settings-panel {
      display: grid;
      gap: 15px;
      padding: 18px;
    }

    .section-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card-bg);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 16px 17px 13px;
      border-bottom: 1px solid #f7eaf0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: 17px;
      font-weight: 800;
    }

    .section-icon {
      display: grid;
      place-items: center;
      width: 33px;
      height: 33px;
      border-radius: 12px;
      background: var(--pink-soft);
      font-size: 17px;
    }

    .section-body { padding: 16px 17px 18px; }
    .subsection + .subsection { margin-top: 20px; padding-top: 18px; border-top: 1px dashed #efdce5; }
    .subsection-label { margin: 0 0 10px; color: #67535e; font-size: 14px; font-weight: 800; }
    .field + .field { margin-top: 14px; }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-weight: 700;
      color: #5f4c57;
    }

    .optional { color: #aa96a1; font-size: 12px; font-weight: 600; }

    .text-input {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid #ead6df;
      border-radius: 14px;
      outline: none;
      background: #fffafd;
      color: var(--text);
      transition: .2s ease;
    }
    .text-input::placeholder { color: #c1afb8; }
    .text-input:focus { border-color: #e88aae; box-shadow: 0 0 0 4px rgba(242,132,168,.13); background: #fff; }

    .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .switch-copy strong { display: block; margin-bottom: 3px; }
    .switch-copy span { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .switch { position: relative; flex: 0 0 auto; width: 52px; height: 30px; }
    .switch input { position: absolute; opacity: 0; pointer-events: none; }
    .switch-track { position: absolute; inset: 0; border-radius: 999px; background: #ddd2d7; transition: .22s ease; }
    .switch-track::after { content: ""; position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; border-radius: 50%; background: #fff; box-shadow: 0 3px 9px rgba(70,45,57,.18); transition: .22s ease; }
    .switch input:checked + .switch-track { background: linear-gradient(135deg,#f7a1bc,var(--pink)); }
    .switch input:checked + .switch-track::after { transform: translateX(22px); }

    .upload-box {
      width: 100%;
      display: grid;
      place-items: center;
      min-height: 120px;
      margin-top: 14px;
      padding: 18px;
      border: 2px dashed #efc3d4;
      border-radius: 18px;
      background: #fff9fc;
      text-align: center;
      color: #8b7180;
    }
    .upload-box:hover { border-color: #eb8fb1; background: #fff3f8; }
    .upload-box b { display: block; margin-top: 7px; color: var(--pink-dark); }
    .upload-box small { display: block; margin-top: 5px; line-height: 1.6; }

    .option-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 9px; }
    .option-grid.seven { grid-template-columns: repeat(4,minmax(0,1fr)); }
    .option-button {
      position: relative;
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid #ead8e1;
      border-radius: 14px;
      background: #fff;
      color: #6b5662;
      font-weight: 700;
      transition: .18s ease;
    }
    .option-button:hover { transform: translateY(-1px); border-color: #e5afc3; }
    .option-button.active { border-color: #ef8fb1; background: #fff0f6; color: var(--pink-dark); box-shadow: inset 0 0 0 1px #ef8fb1; }
    .color-button { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; min-height: 66px; padding: 8px 4px; font-size: 12px; }
    .color-dot { width: 25px; height: 25px; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 0 1px rgba(95,76,87,.15); }
    .theme-area.is-hidden, .photo-controls.is-hidden { display: none; }

    .preview-panel { position: sticky; top: 94px; min-height: 720px; padding: 18px; }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 3px 4px;
    }

    .preview-toolbar h2 {
      margin: 0;
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: 20px;
    }

    .preview-note {
      color: var(--muted);
      font-size: 13px;
    }

    .preview-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 610px;
      overflow: auto;
      padding: 24px;
      border: 1px solid #f1dce5;
      border-radius: 23px;
      background:
        linear-gradient(45deg, #f8edf2 25%, transparent 25%),
        linear-gradient(-45deg, #f8edf2 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8edf2 75%),
        linear-gradient(-45deg, transparent 75%, #f8edf2 75%),
        #fff;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      background-size: 24px 24px;
    }

    .print-sheet {
      width: min(640px, 100%);
      aspect-ratio: 210 / 297;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      padding: 26px;
      background: #fff;
      box-shadow: 0 18px 38px rgba(91, 57, 74, 0.16);
      transform-origin: top center;
    }

    .print-sheet.layout-4 { grid-template-rows: repeat(2, 1fr); }
    .print-sheet.layout-6 { grid-template-rows: repeat(3, 1fr); gap: 12px; }

    .print-item {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .tag-shell {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      filter: drop-shadow(0 7px 10px rgba(91, 57, 74, 0.14));
    }

    .tag-card {
      --tag-main: #ffdbe8;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 17% 10% 9%;
      border: 5px solid #fff;
      border-radius: 24px;
      background:
        linear-gradient(155deg, rgba(255,255,255,.74), rgba(255,255,255,.12)),
        var(--tag-main);
      box-shadow: inset 0 0 0 1.5px rgba(255,255,255,.82);
      text-align: center;
      isolation: isolate;
    }

    .tag-card::before,
    .tag-card::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 999px;
      background: rgba(255,255,255,.31);
    }

    .tag-card::before {
      width: 48%;
      aspect-ratio: 1;
      top: -18%;
      right: -15%;
    }

    .tag-card::after {
      width: 42%;
      aspect-ratio: 1;
      left: -13%;
      bottom: -15%;
    }

    .hole-mark {
      position: absolute;
      z-index: 8;
      width: clamp(10px, 5.5%, 18px);
      aspect-ratio: 1;
      border: 2px solid rgba(107, 86, 98, 0.48);
      border-radius: 50%;
      background: rgba(255,255,255,.96);
      box-shadow: 0 1px 4px rgba(91, 57, 74, 0.12);
    }

    .hole-mark.center {
      top: 3.8%;
      left: 50%;
      transform: translateX(-50%);
    }

    .hole-mark.corner {
      top: 5.2%;
      left: 7%;
    }

    .illustrations {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .deco-svg {
      position: absolute;
      width: clamp(30px, 20%, 58px);
      aspect-ratio: 1;
      filter: drop-shadow(0 4px 5px rgba(91,57,74,.12));
    }

    .deco-svg.a { top: 8%; left: 7%; transform: rotate(-8deg); }
    .deco-svg.b { top: 12%; right: 5%; transform: rotate(9deg); }
    .deco-svg.c { bottom: 7%; left: 5%; transform: rotate(7deg); }
    .deco-svg.d { bottom: 12%; right: 6%; transform: rotate(-8deg); }

    .tag-card.simple .illustrations { display: none; }

    .photo-frame {
      position: relative;
      z-index: 3;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 45%;
      aspect-ratio: 1;
      margin-bottom: 7%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,.94);
      border-radius: 50%;
      background: rgba(255,255,255,.62);
      box-shadow: 0 8px 14px rgba(91,57,74,.12);
      color: rgba(107,86,98,.62);
      font-size: clamp(20px, 8vw, 38px);
    }

    .photo-frame.square { border-radius: 22%; }
    .photo-frame.is-hidden { display: none; }

    .tag-text {
      position: relative;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .tag-name,
    .tag-class,
    .tag-phone {
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .tag-name {
      font-family: "M PLUS Rounded 1c", sans-serif;
      font-size: clamp(17px, 4.4vw, 34px);
      font-weight: 800;
      line-height: 1.2;
      color: #57424d;
      text-shadow: 0 1px 0 rgba(255,255,255,.55);
    }

    .tag-class,
    .tag-phone {
      margin-top: 4%;
      color: #725d69;
      font-weight: 700;
      line-height: 1.35;
    }

    .tag-class { font-size: clamp(11px, 2.6vw, 18px); }
    .tag-phone { font-size: clamp(9px, 2.1vw, 15px); letter-spacing: .02em; }

    .tag-name:empty,
    .tag-class:empty,
    .tag-phone:empty { display: none; }

    .tag-card.no-photo .tag-name { font-size: clamp(21px, 5.2vw, 40px); }
    .tag-card.name-only .tag-name { font-size: clamp(25px, 6vw, 46px); }

    .action-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .action-button {
      min-height: 52px;
      border-radius: 16px;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .action-button.primary {
      background: linear-gradient(135deg, #f49abc, var(--pink-dark));
      color: #fff;
      box-shadow: 0 10px 20px rgba(217, 95, 141, 0.23);
    }

    .action-button.secondary {
      border: 1px solid #ecc4d3;
      background: #fff;
      color: var(--pink-dark);
    }

    .action-button:hover { transform: translateY(-1px); }
    .action-button:disabled { opacity: .58; cursor: wait; transform: none; }

    .coming-note {
      margin: 11px 0 0;
      color: #a28e99;
      font-size: 12px;
      line-height: 1.6;
      text-align: center;
    }

    .site-footer {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto 28px;
      padding: 20px 16px;
      border-top: 1px solid rgba(234,220,228,.9);
      color: #9b8993;
      font-size: 12px;
      text-align: center;
      letter-spacing: .03em;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 380px minmax(0, 1fr);
      }

      .option-grid.seven {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 880px) {
      .topbar {
        min-height: 64px;
        padding: 10px 16px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .back-link {
        min-height: 38px;
        padding: 0 13px;
        font-size: 13px;
      }

      .page {
        width: min(100% - 20px, 760px);
        margin-top: 20px;
      }

      .workspace {
        display: flex;
        flex-direction: column;
      }

      .settings-panel,
      .preview-panel {
        width: 100%;
      }

      .preview-panel {
        position: static;
        min-height: 0;
        order: -1;
      }

      .preview-stage {
        min-height: 520px;
        padding: 30px 16px;
      }

    }

    @media (max-width: 520px) {
      .page-heading {
        padding-inline: 10px;
      }

      .lead {
        font-size: 14px;
      }

      .settings-panel,
      .preview-panel {
        border-radius: 22px;
      }

      .settings-panel {
        padding: 11px;
      }

      .section-title,
      .section-body {
        padding-left: 14px;
        padding-right: 14px;
      }

      .option-grid.seven {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .preview-stage {
        min-height: 455px;
      }


      .tag-card {
        inset-top: 16px;
        padding: 38px 22px 26px;
        border-width: 6px;
        border-radius: 29px;
      }

      .photo-frame {
        width: 124px;
        height: 124px;
        margin-bottom: 18px;
      }

      .tag-class {
        font-size: 17px;
      }

      .tag-phone {
        font-size: 14px;
      }

      .action-bar {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="../css/components.css" />
</head>

<body>
  <header class="tool-header">
    <a
      class="tool-header-home"
      href="../index.html"
      aria-label="返回 Feixin Kids 首頁"
    >
      <b>Feixin Kids</b>
      <span>書包／行李吊牌</span>
    </a>
  </header>

  <main class="page">
    <section class="page-heading">
      <div class="eyebrow">🎒 第二個親子設計工具</div>
      <h1>書包／行李吊牌製作器</h1>
      <p class="lead">
        自由選擇照片、色系與插畫主題，快速製作適合書包、行李箱與生活用品的專屬吊牌。
      </p>
    </section>

    <section class="workspace">
      <aside class="settings-panel fx-card" aria-label="吊牌設定">
        <section class="section-card">
          <h2 class="section-title"><span class="section-icon">📷</span>1. 照片</h2>
          <div class="section-body">
            <div class="switch-row">
              <div class="switch-copy"><strong>使用照片</strong><span>不需要照片時可直接關閉。</span></div>
              <label class="switch"><input id="usePhoto" type="checkbox" checked /><span class="switch-track"></span></label>
            </div>
            <div id="photoControls" class="photo-controls">
              <button class="upload-box" type="button" aria-label="上傳照片">
                <span style="font-size:32px">＋</span><b>上傳照片</b><small>下一版加入實際上傳、拖曳與裁切功能。</small>
              </button>
              <div class="subsection">
                <p class="subsection-label">照片形狀</p>
                <div class="option-grid" data-group="photoShape">
                  <button class="option-button active" type="button" data-value="circle">圓形</button>
                  <button class="option-button" type="button" data-value="square">圓角方形</button>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title"><span class="section-icon">👤</span>2. 基本資料</h2>
          <div class="section-body">
            <label class="field"><span class="field-label"><span>姓名</span><span class="optional">可留白</span></span><input id="nameInput" class="text-input" type="text" maxlength="12" placeholder="例如：林小可" value="林小可" /></label>
            <label class="field"><span class="field-label"><span>班級</span><span class="optional">選填</span></span><input id="classInput" class="text-input" type="text" maxlength="18" placeholder="例如：維也納班" value="維也納班" /></label>
            <label class="field"><span class="field-label"><span>電話</span><span class="optional">選填</span></span><input id="phoneInput" class="text-input" type="text" maxlength="20" placeholder="例如：0912-345-678" /></label>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title"><span class="section-icon">🎨</span>3. 外觀設定</h2>
          <div class="section-body">
            <div class="subsection" style="margin-top:0;padding-top:0;border-top:0">
              <p class="subsection-label">主色系</p>
              <div class="option-grid seven" data-group="color">
                <button class="option-button color-button active" type="button" data-value="pink"><span class="color-dot" style="background:#ffdbe8"></span>粉紅</button>
                <button class="option-button color-button" type="button" data-value="blue"><span class="color-dot" style="background:#dceeff"></span>天空藍</button>
                <button class="option-button color-button" type="button" data-value="purple"><span class="color-dot" style="background:#e8ddff"></span>薰衣草紫</button>
                <button class="option-button color-button" type="button" data-value="mint"><span class="color-dot" style="background:#dff5ec"></span>薄荷綠</button>
                <button class="option-button color-button" type="button" data-value="yellow"><span class="color-dot" style="background:#fff0bd"></span>奶油黃</button>
                <button class="option-button color-button" type="button" data-value="cream"><span class="color-dot" style="background:#f7f0df"></span>米白</button>
                <button class="option-button color-button" type="button" data-value="latte"><span class="color-dot" style="background:#ead8c6"></span>奶茶</button>
              </div>
            </div>
            <div class="subsection">
              <p class="subsection-label">背景樣式</p>
              <div class="option-grid" data-group="backgroundStyle"><button class="option-button active" type="button" data-value="cute">可愛插畫</button><button class="option-button" type="button" data-value="simple">簡約素色</button></div>
              <div id="themeArea" class="theme-area">
                <div class="subsection"><p class="subsection-label">插畫主題</p><div class="option-grid" data-group="theme">
                  <button class="option-button active" type="button" data-value="heart">愛心</button><button class="option-button" type="button" data-value="star">星星</button><button class="option-button" type="button" data-value="rainbow">彩虹</button><button class="option-button" type="button" data-value="flower">小花</button><button class="option-button" type="button" data-value="cloud">雲朵</button><button class="option-button" type="button" data-value="forest">森林</button>
                </div></div>
              </div>
            </div>
            <div class="subsection">
              <p class="subsection-label">吊掛方式</p>
              <div class="option-grid" data-group="holePosition"><button class="option-button active" type="button" data-value="center">上方置中</button><button class="option-button" type="button" data-value="corner">左上角</button><button class="option-button" type="button" data-value="none">不預留打孔</button></div>
              <div class="switch-row" style="margin-top:15px"><div class="switch-copy"><strong>顯示打孔定位記號</strong><span>列印後方便對準打孔位置。</span></div><label class="switch"><input id="showHoleMark" type="checkbox" checked /><span class="switch-track"></span></label></div>
            </div>
          </div>
        </section>

        <section class="section-card">
          <h2 class="section-title"><span class="section-icon">🖨️</span>4. 列印與下載</h2>
          <div class="section-body">
            <div class="option-grid" data-group="printLayout"><button class="option-button active" type="button" data-value="4">A4・4 張版</button><button class="option-button" type="button" data-value="6">A4・6 張版</button></div>
            <div class="action-bar"><button id="downloadPng" class="action-button secondary" type="button">下載 PNG</button><button id="downloadPdf" class="action-button primary" type="button">下載 PDF</button></div>
            <p class="coming-note">下載會依目前選擇輸出 A4・4 張或 A4・6 張版型。</p>
          </div>
        </section>
      </aside>

      <section class="preview-panel fx-card" aria-label="吊牌預覽">
        <div class="preview-toolbar">
          <h2>即時預覽</h2>
          <div id="layoutNote" class="preview-note">A4・4 張版</div>
        </div>

        <div class="preview-stage">
          <div id="printSheet" class="print-sheet layout-4" aria-label="A4 吊牌排版預覽"></div>
        </div>
      </section>
    </section>
  </main>
  <footer class="site-footer">© 2026 Feixin Kids · Design · Download · Print</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const state = {
      usePhoto: true,
      photoShape: "circle",
      color: "pink",
      backgroundStyle: "cute",
      theme: "heart",
      holePosition: "center",
      showHoleMark: true,
      printLayout: "4"
    };

    const colorMap = {
      pink: "#ffdbe8",
      blue: "#dceeff",
      purple: "#e8ddff",
      mint: "#dff5ec",
      yellow: "#fff0bd",
      cream: "#f7f0df",
      latte: "#ead8c6"
    };

    const palette = {
      heart: ["#f66f9b", "#ffb3ca", "#fff"],
      star: ["#8f78e8", "#ffd46a", "#fff"],
      rainbow: ["#ff8cad", "#ffd36a", "#79d6cf"],
      flower: ["#f78eb4", "#ffd76f", "#fff"],
      cloud: ["#87c9f4", "#fff", "#c9b5f7"],
      forest: ["#6bc79a", "#b8e29b", "#fff"]
    };

    const nameInput = document.getElementById("nameInput");
    const classInput = document.getElementById("classInput");
    const phoneInput = document.getElementById("phoneInput");
    const usePhoto = document.getElementById("usePhoto");
    const showHoleMark = document.getElementById("showHoleMark");
    const photoControls = document.getElementById("photoControls");
    const themeArea = document.getElementById("themeArea");
    const printSheet = document.getElementById("printSheet");
    const layoutNote = document.getElementById("layoutNote");
    const downloadPng = document.getElementById("downloadPng");
    const downloadPdf = document.getElementById("downloadPdf");

    function svgIcon(theme, variant = 0) {
      const [a,b,c] = palette[theme];
      if (theme === "heart") return `<svg viewBox="0 0 100 100"><path d="M50 84C18 62 8 47 13 29c5-18 28-22 37-5 9-17 32-13 37 5 5 18-5 33-37 55Z" fill="${variant%2?a:b}" stroke="#fff" stroke-width="6"/><circle cx="34" cy="34" r="7" fill="#fff" opacity=".55"/></svg>`;
      if (theme === "star") return `<svg viewBox="0 0 100 100"><path d="m50 8 12 27 30 3-23 20 7 29-26-15-26 15 7-29L8 38l30-3Z" fill="${variant%2?a:b}" stroke="#fff" stroke-width="6"/><circle cx="40" cy="35" r="6" fill="#fff" opacity=".6"/></svg>`;
      if (theme === "rainbow") return `<svg viewBox="0 0 110 90"><path d="M15 76a40 40 0 0 1 80 0" fill="none" stroke="${a}" stroke-width="15" stroke-linecap="round"/><path d="M27 76a28 28 0 0 1 56 0" fill="none" stroke="${b}" stroke-width="13" stroke-linecap="round"/><path d="M39 76a16 16 0 0 1 32 0" fill="none" stroke="${c}" stroke-width="11" stroke-linecap="round"/><circle cx="15" cy="76" r="14" fill="#fff"/><circle cx="95" cy="76" r="14" fill="#fff"/></svg>`;
      if (theme === "flower") return `<svg viewBox="0 0 100 100"><g fill="${a}" stroke="#fff" stroke-width="5"><ellipse cx="50" cy="22" rx="17" ry="22"/><ellipse cx="78" cy="50" rx="22" ry="17"/><ellipse cx="50" cy="78" rx="17" ry="22"/><ellipse cx="22" cy="50" rx="22" ry="17"/></g><circle cx="50" cy="50" r="20" fill="${b}" stroke="#fff" stroke-width="5"/><circle cx="43" cy="43" r="5" fill="#fff" opacity=".6"/></svg>`;
      if (theme === "cloud") return `<svg viewBox="0 0 120 85"><path d="M25 70c-13 0-20-8-20-19s9-20 20-20c5-15 18-23 32-20 12 2 20 10 23 21 17-4 34 7 34 23 0 9-7 15-18 15Z" fill="${b}" stroke="${a}" stroke-width="6"/><circle cx="42" cy="39" r="7" fill="${c}" opacity=".45"/></svg>`;
      return `<svg viewBox="0 0 100 100"><path d="M50 90V43" stroke="#8d6b53" stroke-width="8" stroke-linecap="round"/><path d="M50 10C28 21 21 40 30 54c8 12 22 12 20 12s12 0 20-12c9-14 2-33-20-44Z" fill="${variant%2?a:b}" stroke="#fff" stroke-width="6"/><path d="M50 29c-8 9-12 18-12 27M50 29c8 9 12 18 12 27" fill="none" stroke="#fff" stroke-width="4" opacity=".65"/></svg>`;
    }

    function makeTag() {
      const name = nameInput.value.trim();
      const className = classInput.value.trim();
      const phone = phoneInput.value.trim();
      const noPhoto = !state.usePhoto;
      const nameOnly = Boolean(name) && !className && !phone && noPhoto;
      const simple = state.backgroundStyle === "simple";
      const showHole = state.showHoleMark && state.holePosition !== "none";
      const decos = [0,1,2,3].map((i)=>`<span class="deco-svg ${['a','b','c','d'][i]}">${svgIcon(state.theme,i)}</span>`).join('');
      return `<div class="print-item"><div class="tag-shell"><article class="tag-card ${simple?'simple':''} ${noPhoto?'no-photo':''} ${nameOnly?'name-only':''}" style="--tag-main:${colorMap[state.color]}">
        ${showHole?`<span class="hole-mark ${state.holePosition}"></span>`:''}
        <div class="illustrations">${decos}</div>
        ${state.usePhoto?`<div class="photo-frame ${state.photoShape==='square'?'square':''}">☺</div>`:''}
        <div class="tag-text"><div class="tag-name">${escapeHtml(name)}</div><div class="tag-class">${escapeHtml(className)}</div><div class="tag-phone">${escapeHtml(phone)}</div></div>
      </article></div></div>`;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch]));
    }

    function renderPreview() {
      const count = Number(state.printLayout);
      printSheet.className = `print-sheet layout-${count}`;
      printSheet.innerHTML = Array.from({length:count}, makeTag).join('');
      layoutNote.textContent = `A4・${count} 張版`;
      photoControls.classList.toggle("is-hidden", !state.usePhoto);
      themeArea.classList.toggle("is-hidden", state.backgroundStyle === "simple");
    }

    function handleOptionGroup(group) {
      group.addEventListener("click", (event) => {
        const button = event.target.closest(".option-button");
        if (!button) return;
        group.querySelectorAll(".option-button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state[group.dataset.group] = button.dataset.value;
        renderPreview();
      });
    }

    async function captureSheet() {
      if (!window.html2canvas) throw new Error("下載元件尚未載入，請重新整理頁面後再試一次。");
      await document.fonts.ready;
      return html2canvas(printSheet, {
        scale: 3,
        backgroundColor: "#ffffff",
        useCORS: true,
        logging: false
      });
    }

    function triggerDownload(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    downloadPng.addEventListener("click", async () => {
      try {
        downloadPng.disabled = true;
        downloadPng.textContent = "產生中…";
        const canvas = await captureSheet();
        triggerDownload(canvas.toDataURL("image/png"), `Feixin-Kids-吊牌-${state.printLayout}張版.png`);
      } catch (error) {
        alert(error.message || "PNG 產生失敗，請稍後再試。");
      } finally {
        downloadPng.disabled = false;
        downloadPng.textContent = "下載 PNG";
      }
    });

    downloadPdf.addEventListener("click", async () => {
      try {
        downloadPdf.disabled = true;
        downloadPdf.textContent = "產生中…";
        if (!window.jspdf) throw new Error("PDF 元件尚未載入，請重新整理頁面後再試一次。");
        const canvas = await captureSheet();
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, 210, 297, undefined, "FAST");
        pdf.save(`Feixin-Kids-吊牌-${state.printLayout}張版.pdf`);
      } catch (error) {
        alert(error.message || "PDF 產生失敗，請稍後再試。");
      } finally {
        downloadPdf.disabled = false;
        downloadPdf.textContent = "下載 PDF";
      }
    });

    document.querySelectorAll("[data-group]").forEach(handleOptionGroup);
    [nameInput, classInput, phoneInput].forEach(input => input.addEventListener("input", renderPreview));
    usePhoto.addEventListener("change", () => { state.usePhoto = usePhoto.checked; renderPreview(); });
    showHoleMark.addEventListener("change", () => { state.showHoleMark = showHoleMark.checked; renderPreview(); });
    renderPreview();
  </script>
</body>
</html>
