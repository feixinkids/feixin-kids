<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feixin Kids｜大頭照姓名貼 </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/sticker.css">
</head>
<body>
<header><b>Feixin Kids</b><span>大頭照姓名貼</span></header>
<main>
<section class="controls">
<div class="title-row"><div><small>STEP 1–5</small><h1>製作專屬姓名貼</h1></div><button id="resetBtn">重新開始</button></div>

<article><h2>1. 上傳照片</h2>
<label class="upload" for="photoInput"><strong>＋ 選擇小朋友照片</strong><em>JPG、PNG、WebP</em></label>
<input id="photoInput" type="file" accept="image/*" hidden>
<div id="photoTools" hidden>
<div class="crop-wrap"><canvas id="cropCanvas" width="520" height="360"></canvas><i></i></div>
<label class="range"><span>照片縮放</span><input id="zoomRange" type="range" min=".5" max="4" step=".01" value="1"></label>
<div class="buttons"><button id="centerBtn">重新置中</button></div>
</div></article>

<article><h2>2. 輸入姓名</h2>
<input id="nameInput" class="name-input" maxlength="8" value="林小可">
<div class="two"><label>文字顏色<input id="textColor" type="color" value="#4b3b52"></label>
<label>字體大小 <b id="fontSizeValue">100%</b><input id="fontSizeRange" type="range" min="70" max="180" step="2" value="100"></label></div>
<label class="check"><input id="textOutline" type="checkbox" checked> 白色文字外框</label>
</article>

<article>
<div class="title-row"><h2>3. 選擇字體</h2><span id="fontCount" class="font-count"></span></div>
<div id="fontGrid" class="font-grid"></div>

</article>
<article>
<div class="title-row"><h2>4. 選擇背景</h2><div id="filters" class="filters"></div></div>
<div id="backgroundGrid" class="bg-grid"></div>

</article>
<article><h2>5. 選擇列印版型</h2>
<div id="paperTabs" class="tabs"><button class="active" data-paper="a4">A4</button><button data-paper="4x6">4×6 相片</button></div>
<div id="quantities" class="quantities"></div><p id="layoutHint"></p></article>
<div class="exports"><button id="pngBtn">下載 PNG</button><button id="pdfBtn">下載 PDF</button><p id="exportStatus"></p></div>
</section>

<section class="preview"><div class="title-row"><div><small>即時預覽</small><h2>列印成品</h2></div><span id="meta"></span></div>
<div class="canvas-wrap"><canvas id="sheetCanvas"></canvas></div><p>畫面預覽會縮小；下載檔維持高解析度。</p></section>
</main>
<footer>© 2026 Feixin Kids · Design · Download · Print</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<script type="module" src="js/sticker.js"></script>
</body></html>
