<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>大頭照姓名貼｜Feixin Kids</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <div class="container navbar">
      <a href="index.html" class="logo">
        Feixin <span>Kids</span>
      </a>

      <nav class="nav-links">
        <a href="index.html#tools">設計工具</a>
        <a href="index.html#print">列印方式</a>
        <a href="index.html#about">關於我們</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="sticker-page">
      <div class="container">

        <div class="sticker-heading">
          <span class="eyebrow">PHOTO NAME STICKER</span>
          <h1>大頭照姓名貼</h1>
          <p>上傳孩子的照片，製作專屬姓名貼。</p>
        </div>

<div class="sticker-workspace">

  <section class="sticker-panel">

    <h2>編輯姓名貼</h2>

    <button>📷 上傳照片</button>

    <label>姓名</label>
    <input type="text" placeholder="例如：王小明">

    <label>字體</label>
    <select>
      <option>圓體</option>
      <option>黑體</option>
    </select>

    <label>文字顏色</label>
    <input type="color" value="#ffffff">

    <label>姓名貼樣式</label>
    <select>
      <option>粉色</option>
      <option>藍色</option>
      <option>紫色</option>
      <option>綠色</option>
      <option>黃色</option>
    </select>

    <label>輸出尺寸</label>
    <select>
      <option>A4－24張</option>
      <option>A4－30張</option>
      <option>A4－48張</option>
      <option>4×6 超商列印</option>
    </select>

  </section>

  <section class="sticker-preview">

    <h2>即時預覽</h2>

    <div class="sticker-sample">

      <div class="sticker-photo">
        😊
      </div>

      <strong>林小可</strong>

    </div>

  </section>

</div>

      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      © 2026 Feixin Kids · Design · Download · Print
    </div>
  </footer>

</body>
</html>
